services:
  # --------------------------------------------------
  # ARGOS API — FastAPI backend with LLM integrations
  # --------------------------------------------------
  # --------------------------------------------------
  # ARGOS DB — PostgreSQL 17 + pgvector
  # --------------------------------------------------
  argos-db:
    image: pgvector/pgvector:pg17
    container_name: argos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: argos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-argos_secret}
      POSTGRES_DB: argos
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argos"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - argos-network

  argos-api:
    build: .
    container_name: argos-api
    restart: unless-stopped
    env_file: .env
    command: ["uvicorn", "api.server:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    ports:
      - "8000:8000"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_KEY_2=${LLM_API_KEY_2:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_BOT_TOKEN=${TELEGRAM_CHAT_BOT_TOKEN:-}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID:-}
      - N8N_API_KEY=${N8N_API_KEY}
      - ARGOS_API_KEY=${ARGOS_API_KEY:-}
      - DATABASE_URL=postgresql://argos:${POSTGRES_PASSWORD:-argos_secret}@argos-db:5432/argos
      - DB_BACKEND=${DB_BACKEND:-postgres}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://argos-jaeger:4317
      - OTEL_SERVICE_NAME=argos-api
      - DOCKER_HOST=tcp://argos-docker-proxy:2375
      - HOST_WORKSPACE_DIR=${HOST_WORKSPACE_DIR:-${PWD}/data/workspace}
      - WORKSPACE_DIR=/app/data/workspace
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./logs:/tmp/argos_logs
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
    depends_on:
      argos-db:
        condition: service_healthy
    networks:
      - argos-network

  # --------------------------------------------------
  # n8n — Automation Engine (HITL & Workflow Orchestration)
  # --------------------------------------------------
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: argos-n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - WEBHOOK_URL=https://${NGROK_DOMAIN}/
      - N8N_EDITOR_BASE_URL=http://localhost:5678
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - ARGOS_API_KEY=${ARGOS_API_KEY:-}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      argos-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - argos-network

  # --------------------------------------------------
  # Ngrok — Secure Webhook Tunneling
  # --------------------------------------------------
  ngrok:
    image: ngrok/ngrok:latest
    container_name: argos-ngrok
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    command: >
      http n8n:5678 --domain=${NGROK_DOMAIN:-""}
    depends_on:
      - n8n
    networks:
      - argos-network

  # --------------------------------------------------
  # Jaeger — Distributed Tracing (OpenTelemetry)
  # --------------------------------------------------
  argos-jaeger:
    image: jaegertracing/jaeger:2.17.0
    container_name: argos-jaeger
    restart: unless-stopped
    ports:
      - "16687:16686"   # Mapped to 16687 to avoid conflict with existing Jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - argos-network

# --------------------------------------------------
  # Docker Socket Proxy — Secure Isolation
  # --------------------------------------------------
  argos-docker-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: argos-docker-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:2375:2375"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      POST: 1
      IMAGES: 1
      BUILD: 0
      COMMIT: 0
      EXEC: 0
      NETWORKS: 0
      VOLUMES: 0
    networks:
      - argos-network

volumes:
  n8n_data:
  pgdata:

networks:
  argos-network:
    driver: bridge
