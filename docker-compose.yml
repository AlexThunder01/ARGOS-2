services:
  # --------------------------------------------------
  # ARGOS API — FastAPI backend with LLM integrations
  # --------------------------------------------------
  argos-api:
    build: .
    container_name: argos-api
    restart: unless-stopped
    command: ["uvicorn", "api.server:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_API_KEY2=${GROQ_API_KEY2:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - N8N_API_KEY=${N8N_API_KEY}
      - ARGOS_API_KEY=${ARGOS_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./logs:/tmp/argos_logs
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
    networks:
      - argos-network

  # --------------------------------------------------
  # n8n — Automation Engine (HITL & Workflow Orchestration)
  # --------------------------------------------------
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: argos-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - WEBHOOK_URL=https://${NGROK_DOMAIN}/
      - N8N_EDITOR_BASE_URL=http://localhost:5678
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      argos-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz", "||", "exit", "1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - argos-network

  # --------------------------------------------------
  # Ngrok — Secure Webhook Tunneling
  # --------------------------------------------------
  ngrok:
    image: ngrok/ngrok:latest
    container_name: argos-ngrok
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    command: >
      http n8n:5678 --domain=${NGROK_DOMAIN:-""}
    depends_on:
      - n8n
    networks:
      - argos-network

volumes:
  n8n_data:


networks:
  argos-network:
    driver: bridge
