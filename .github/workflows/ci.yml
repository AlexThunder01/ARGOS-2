name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. LINTING JOB
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          
      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

  # 2. SQLITE TEST JOB (Fast Feedback)
  test-sqlite:
    needs: lint
    runs-on: ubuntu-latest
    env:
      DB_BACKEND: sqlite
      ARGOS_API_KEY: "test_key"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
    
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          
      - name: Run Pytest (SQLite)
        run: |
          pytest tests/ -v

  # 3. POSTGRESQL TEST JOB (Data Layer Validation)
  test-postgres:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: argos
          POSTGRES_PASSWORD: argos_secret
          POSTGRES_DB: argos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_BACKEND: postgres
      DATABASE_URL: postgresql://argos:argos_secret@localhost:5432/argos
      ARGOS_API_KEY: "test_key"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Apply Schemas
        run: |
          # The pgvector image starts empty in GH Actions (no init script bound).
          # We need to manually inject the schema.
          PGPASSWORD=argos_secret psql -h localhost -U argos -d argos -f src/db/schema.sql

      - name: Run Pytest (PostgreSQL)
        run: |
          pytest tests/ -v
