# ==============================================================================
# ARGOS WORKFLOW CONFIGURATION
# 
# This file controls the runtime behavior of the n8n workflows 
# globally from a centralized configuration, without needing to 
# edit the visual workflows themselves.
# ==============================================================================

gmail_assistant:
  # Master switch: if false, the agent will instantly ignore all new emails 
  # without consuming any LLM tokens or creating Telegram notifications.
  enabled: true

  # ----------------------------------------------------------------------------
  # FILTERING
  # ----------------------------------------------------------------------------
  filters:
    # List of sender email patterns (regex or exact match) to automatically ignore
    ignore_senders:
      - "*@newsletter.com"
      - "noreply@*"
      - "*@marketing.*"
      - "info@*"

    # If defined, only process emails that are recognized as one of these languages.
    # Leave empty or commented out to process all languages.
    allowed_languages:
      - "it"
      - "en"

    # Minimum priority required to notify the user and generate a draft.
    # Available levels (from highest to lowest): HIGH, MEDIUM, LOW, SPAM.
    # If set to MEDIUM, then LOW and SPAM will be automatically ignored.
    min_priority: "MEDIUM"

  # ----------------------------------------------------------------------------
  # AGENT BEHAVIOR
  # ----------------------------------------------------------------------------
  behavior:
    # Instructs the LLM on how to style the generated draft response. 
    # Example: "professional yet highly empathetic", "extremely formal", "casual and brief"
    tone_of_voice: "professional yet friendly"

    # Append this text to the end of every drafted email
    custom_signature: "\n\n--\nCordiali Saluti, \n Alessandro Catania"

    # If true, emails classified as "low" priority or "spam" will be automatically
    # discarded by n8n without requiring Human-In-The-Loop approval via Telegram.
    auto_discard_spam: false

# ==============================================================================
# TELEGRAM CHAT BOT — Public Chat Module Configuration
# ==============================================================================

telegram_assistant:
  # Master switch — if false, the bot won't process any messages
  enabled: true

  # --------------------------------------------------------------------------
  # BOT IDENTITY
  # --------------------------------------------------------------------------
  identity:
    bot_name: "ARGOS"
    persona: >
      You are an intelligent and precise AI assistant. You are curious, direct,
      and value clarity. You don't use empty courtesy phrases.
      When you don't know something, you admit it without hesitation.
    welcome_message: >
      Hello! I'm ARGOS, your personal AI assistant.
      I can remember our previous conversations and adapt
      to your preferences over time. How can I help?
    unauthorized_message: >
      Hello! This bot is invite-only.
      Your access request has been registered.
      You'll receive a notification when approved.

  # --------------------------------------------------------------------------
  # BEHAVIOR & RESPONSE
  # --------------------------------------------------------------------------
  behavior:
    default_language: "it"
    default_tone: "neutral"
    conversation_window: 20
    max_memories_retrieved: 3
    rag_similarity_threshold: 0.70
    max_conversation_history: 200
    enable_memory_extraction: true
    max_input_length: 4000
    memory:
      enable_poisoning_detection: true
      risk_threshold: 0.5
      suspicious_retention: 500

  # --------------------------------------------------------------------------
  # RATE LIMITING
  # --------------------------------------------------------------------------
  limits:
    max_messages_per_day: 0    # 0 = unlimited
    max_messages_per_hour: 0

  # --------------------------------------------------------------------------
  # ADMIN
  # --------------------------------------------------------------------------
  admin:
    notify_on_new_user: true
    auto_approve: false

